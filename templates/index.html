<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Fechamento de Caixa</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
  <div class="container py-5">
    <h1 class="mb-4 text-center">📊 Fechamento de Caixa</h1>

    <div class="row text-center g-4">
      <div class="col-md-3">
        <div class="card shadow-sm">
          <div class="card-body">
            <h6 class="card-title">Faturamento Bruto</h6>
            <p class="display-6 text-primary">R$ {{ faturamento }}</p>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card shadow-sm">
          <div class="card-body">
            <h6 class="card-title">Taxas de Serviço</h6>
            <p class="display-6 text-danger">R$ {{ taxas }}</p>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card shadow-sm">
          <div class="card-body">
            <h6 class="card-title">Incentivos</h6>
            <p class="display-6 text-warning">R$ {{ incentivos }}</p>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card shadow-sm">
          <div class="card-body">
            <h6 class="card-title">Lucro</h6>
            <p class="display-6 text-success">R$ {{ lucro }}</p>
          </div>
        </div>
      </div>
    </div>

    <div class="mt-5">
      <h4 class="mb-3">Faturamento por Dia</h4>
      <canvas id="graficoPedidos"></canvas>
    </div>
  </div>

  <script>
    const ctx = document.getElementById('graficoPedidos');
    const chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: {{ labels | tojson }},
        datasets: [{
          label: 'R$ por dia',
          data: {{ valores | tojson }},
          borderWidth: 1,
          backgroundColor: 'rgba(54, 162, 235, 0.6)'
        }]
      },
      options: {
        responsive: true,
        scales: {
          y: {
            beginAtZero: true,
            ticks: {
              callback: value => 'R$ ' + value.toLocaleString('pt-BR')
            }
          }
        }
      }
    });
  </script>
</body>
</html>
